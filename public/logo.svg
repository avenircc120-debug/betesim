<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8b5cf6;stop-opacity:1" />
    </linearGradient>
  </defs>
  <!-- SIM card shape -->
  <rect x="30" y="20" width="140" height="160" rx="16" ry="16" fill="url(#grad)" />
  <!-- Chip cutout top-left -->
  <polygon points="30,20 65,20 30,55" fill="#1e1b4b" opacity="0.4"/>
  <!-- Chip area -->
  <rect x="50" y="60" width="100" height="70" rx="10" ry="10" fill="white" opacity="0.15"/>
  <rect x="62" y="72" width="76" height="46" rx="7" ry="7" fill="white" opacity="0.2"/>
  <!-- Chip lines -->
  <line x1="80" y1="72" x2="80" y2="118" stroke="white" stroke-width="1.5" opacity="0.4"/>
  <line x1="100" y1="72" x2="100" y2="118" stroke="white" stroke-width="1.5" opacity="0.4"/>
  <line x1="120" y1="72" x2="120" y2="118" stroke="white" stroke-width="1.5" opacity="0.4"/>
  <line x1="62" y1="90" x2="138" y2="90" stroke="white" stroke-width="1.5" opacity="0.4"/>
  <line x1="62" y1="105" x2="138" y2="105" stroke="white" stroke-width="1.5" opacity="0.4"/>
  <!-- betesim text -->
  <text x="100" y="158" font-family="Arial, sans-serif" font-size="22" font-weight="bold" fill="white" text-anchor="middle" letter-spacing="1">betesim</text>
</svg>
